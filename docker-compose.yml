version: '3.8'

services:
  # ─────────────────────────────────────────────
  # BACKEND — Node.js + SQLite natif (Node 22+)
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: relac2026-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 7d
      EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM:-ReLAc 2026 <noreply@relac2026.com>}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "5000:5000"
    volumes:
      # Persistance de la base de données SQLite entre redémarrages
      - sqlite_data:/app/data
      # Persistance des fichiers uploadés (photos, preuves de paiement)
      - uploads_data:/app/uploads
    networks:
      - relac2026-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─────────────────────────────────────────────
  # FRONTEND — Vite build servi par Nginx
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: relac2026-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Volume pour les certificats SSL (Let's Encrypt / Certbot)
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - relac2026-network

# ─────────────────────────────────────────────
# VOLUMES persistants
# ─────────────────────────────────────────────
volumes:
  sqlite_data:
    driver: local
  uploads_data:
    driver: local

# ─────────────────────────────────────────────
# RÉSEAU interne
# ─────────────────────────────────────────────
networks:
  relac2026-network:
    driver: bridge
